<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ritvik Sai Narayan</title>
  <meta name="description" content="Ritvik Sai Narayan — incoming PhD student at MIT, astrophysicist working on exoplanet and stellar astronomy.">

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Space theme -->
  <link href="assets/css/space.css" rel="stylesheet">
</head>

<body>

  <!-- ── Starfield ──────────────────────────── -->
  <canvas id="stars" aria-hidden="true"></canvas>

  <!-- ── Solar System View ─────────────────── -->
  <div id="solar-system-view" aria-label="Solar system navigation">

    <!-- Page title -->
    <div class="site-title" aria-hidden="true">
      <h1>Ritvik Sai Narayan</h1>
      <div class="tagline">Astrophysicist · Incoming MIT PhD Student · Exoplanets &amp; Stellar Evolution</div>
    </div>

    <!-- System -->
    <div class="system-container" role="navigation" aria-label="Sections">

      <!-- Central star → About -->
      <div class="star-body" role="button" tabindex="0"
           aria-label="About — click to open"
           onclick="openPanel('about',this)"
           onkeydown="if(event.key==='Enter'||event.key===' ')openPanel('about',this)">
        <div class="star-surface" aria-hidden="true"></div>
        <div class="star-label" aria-hidden="true">About</div>
      </div>

      <!-- Orbit 1: Contact (Earth — innermost rocky planet) -->
      <div class="orbit orbit-1" aria-hidden="true">
        <div class="planet-wrap"
             role="button" tabindex="0"
             aria-label="Contact — click to open"
             onclick="openPanel('contact',this)"
             onkeydown="if(event.key==='Enter'||event.key===' ')openPanel('contact',this)">
          <div class="planet planet-contact"></div>
          <div class="planet-label">Contact</div>
        </div>
      </div>

      <!-- Orbit 2: CV (Mars — second rocky planet) -->
      <div class="orbit orbit-2" aria-hidden="true">
        <div class="planet-wrap"
             role="button" tabindex="0"
             aria-label="CV — click to open"
             onclick="openPanel('cv',this)"
             onkeydown="if(event.key==='Enter'||event.key===' ')openPanel('cv',this)">
          <div class="planet planet-cv"></div>
          <div class="planet-label">CV</div>
        </div>
      </div>

      <!-- Orbit 3: Research (Jupiter — gas giant, beyond the asteroid belt) -->
      <div class="orbit orbit-3" aria-hidden="true">
        <div class="planet-wrap"
             role="button" tabindex="0"
             aria-label="Research — click to open"
             onclick="openPanel('research',this)"
             onkeydown="if(event.key==='Enter'||event.key===' ')openPanel('research',this)">
          <div class="planet planet-research"></div>
          <div class="planet-label">Research</div>
        </div>
      </div>

    </div><!-- /system-container -->

    <p class="explore-hint" aria-hidden="true">click a planet to explore</p>

  </div><!-- /solar-system-view -->

  <!-- ── Section Panel ─────────────────────── -->
  <div id="panel" role="dialog" aria-modal="true" aria-label="Section content">

    <div class="panel-header">
      <button class="back-btn" onclick="closePanel()" aria-label="Return to solar system">
        ← Back
      </button>
      <div class="panel-planet-dot" id="panel-dot" aria-hidden="true"></div>
      <span class="panel-planet-name" id="panel-name"></span>
    </div>

    <div class="panel-body" id="panel-body">
      <!-- filled by space.js -->
    </div>

  </div><!-- /panel -->

  <!-- ── Mobile Nav Strip ───────────────────── -->
  <nav class="mobile-nav-strip" aria-label="Mobile navigation">
    <button class="mnav-btn about"    onclick="openPanel('about')"    aria-label="About">
      <div class="mnav-dot"></div>
      About
    </button>
    <button class="mnav-btn research" onclick="openPanel('research')" aria-label="Research">
      <div class="mnav-dot"></div>
      Research
    </button>
    <button class="mnav-btn cv"       onclick="openPanel('cv')"       aria-label="CV">
      <div class="mnav-dot"></div>
      CV
    </button>
    <button class="mnav-btn contact"  onclick="openPanel('contact')"  aria-label="Contact">
      <div class="mnav-dot"></div>
      Contact
    </button>
  </nav>

  <script src="assets/js/space.js"></script>
</body>
</html>
